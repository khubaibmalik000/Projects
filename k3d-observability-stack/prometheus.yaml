apiVersion: v1
kind: Namespace
metadata:
  name: prometheus
---
# Secret with Prometheus credential to scrape node-exporter targets
apiVersion: v1
kind: Secret
metadata:
  name: node-exporter-password
  namespace: prometheus
type: Opaque
stringData:
  node-exporter-password: "CHANGE_ME_PASSWORD"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: 'node-exporter-production'
        file_sd_configs:
          - files:
              - /home/KHU/production.json
        basic_auth:
          username: admin
          password_file: /etc/prometheus/secrets/node-exporter-password

      - job_name: 'node-exporter-testing'
        file_sd_configs:
          - files:
              - /home/KHU/testing.json
        basic_auth:
          username: admin
          password_file: /etc/prometheus/secrets/node-exporter-password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: node-exporter-auth
              mountPath: /etc/prometheus/secrets
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-targets
              mountPath: /home/KHU
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: node-exporter-auth
          secret:
            secretName: node-exporter-password
        - name: prometheus-data
          emptyDir: {}
        - name: prometheus-targets
          configMap:
            name: prometheus-targets

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30090
