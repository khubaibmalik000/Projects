apiVersion: v1
kind: Namespace
metadata:
  name: promtail
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: promtail
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: promtail

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets: ["localhost"]
            labels:
              job: dummy-app
              __path__: /var/log/pods/*/*/*.log
        pipeline_stages:
          - match:
              selector: '{job="dummy-app"}'
              stages:
                # Drop logs from app2 and app3 containers
                - drop:
                    expression: 'Container: (app2|app3)'
          - regex:
               expression: 'Pod: (?P<pod>[\w-]+) Container: (?P<container>[\w-]+)'
          - labels:
                pod:
                container:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: promtail
          image: grafana/promtail:3.5.8
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log/pods
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log/pods
            type: Directory
