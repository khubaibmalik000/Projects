runtime: nodejs24
env: flex

env_variables:
  DD_SERVICE: fd-backend-admin
  DD_ENV: prod
  DD_VERSION: "{{ GIT_SHA }}"
  DD_SITE: datadoghq.com
  DD_TRACE_ENABLED: "true"
  DD_LOGS_INJECTION: "true"

# DD_API_KEY is intentionally absent from every checked-in config file.
# It's injected at deploy time from GCP Secret Manager — see ci/deploy.yml.
