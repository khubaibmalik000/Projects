---
# Shared driver config — every role in the estate tests against the same
# baseline (region, AMI family, instance sizing) so results are comparable
# across roles. Real account/subnet/security-group IDs are supplied via
# environment variables, never hardcoded here.
driver:
  name: ec2

platforms:
  - name: nginx-test-rhel9
    image_owner: self
    image_name: "RHEL-9-internal-base-*"
    instance_type: t3.medium
    region: us-east-2
    vpc_subnet_id: "${MOLECULE_SUBNET_ID}"
    security_group_ids:
      - "${MOLECULE_SECURITY_GROUP_ID}"
    ssh_user: ec2-user

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  # idempotence is a hard gate, added back manually — the cookiecutter's
  # default test_sequence omits it.
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
