---
# Mirrors: recipes/default.rb
- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

# Mirrors: recipes/default.rb (template resource)
- name: Deploy nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

# Mirrors: recipes/default.rb (service resource)
- name: Ensure nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
